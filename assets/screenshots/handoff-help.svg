<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Claude to Codex 0.2.0 help output</title>
  <desc id="desc">Terminal output showing the zero-argument handoff command, exact session recovery, Codex model selection, and diagnostic options.</desc>
  <rect width="1440" height="900" fill="#f3f4f6"/>
  <rect x="90" y="58" width="1260" height="784" rx="10" fill="#111318"/>
  <rect x="90" y="58" width="1260" height="52" rx="10" fill="#20242b"/>
  <rect x="90" y="100" width="1260" height="10" fill="#20242b"/>
  <circle cx="122" cy="84" r="7" fill="#ff5f57"/>
  <circle cx="146" cy="84" r="7" fill="#febc2e"/>
  <circle cx="170" cy="84" r="7" fill="#28c840"/>
  <text x="720" y="90" fill="#b6beca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="middle">claude-to-codex 0.2.0</text>
  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="130" y="150" fill="#7dd3fc">$</text>
    <text x="160" y="150" fill="#f8fafc">npm run handoff -- --help</text>
    <text x="130" y="200" fill="#94a3b8">Slash command usage:</text>
    <text x="360" y="200" fill="#5eead4">/handoff</text>
    <text x="130" y="238" fill="#64748b">Exact active session is supplied by Claude Code automatically.</text>
    <text x="130" y="292" fill="#f8fafc">Advanced options</text>
    <text x="130" y="334" fill="#5eead4">--session &lt;uuid&gt;</text>
    <text x="430" y="334" fill="#cbd5e1">Select an exact Claude session</text>
    <text x="130" y="370" fill="#5eead4">--transcript &lt;path&gt;</text>
    <text x="430" y="370" fill="#cbd5e1">Use an exact JSONL transcript</text>
    <text x="130" y="406" fill="#5eead4">--latest</text>
    <text x="430" y="406" fill="#cbd5e1">Explicitly allow newest-session recovery</text>
    <text x="130" y="442" fill="#5eead4">--codex-model &lt;id&gt;</text>
    <text x="430" y="442" fill="#cbd5e1">Pin the Codex continuation model</text>
    <text x="130" y="478" fill="#5eead4">--handoff-reason &lt;kind&gt;</text>
    <text x="430" y="478" fill="#cbd5e1">usage-limit | model-change | context-pressure | manual</text>
    <text x="130" y="514" fill="#5eead4">--mode &lt;mode&gt;</text>
    <text x="430" y="514" fill="#cbd5e1">auto | tmux | terminal | print</text>
    <text x="130" y="550" fill="#5eead4">--tail &lt;n&gt;</text>
    <text x="430" y="550" fill="#cbd5e1">Keep 3 to 200 entries on disk; argv stays bounded</text>
    <text x="130" y="586" fill="#5eead4">--codex-subagents &lt;n&gt;</text>
    <text x="430" y="586" fill="#cbd5e1">Add an optional budget hint from 0 to 8</text>
    <text x="130" y="622" fill="#5eead4">--check</text>
    <text x="430" y="622" fill="#cbd5e1">Verify Codex auth, transcript, git, and launch prerequisites</text>
    <text x="130" y="658" fill="#5eead4">--no-launch</text>
    <text x="430" y="658" fill="#cbd5e1">Create the package and print its private runner</text>
    <text x="130" y="716" fill="#f8fafc">Creates</text>
    <text x="230" y="716" fill="#a7f3d0">~/.claude/handoffs/&lt;timestamp&gt;-&lt;session&gt;/</text>
    <text x="130" y="762" fill="#94a3b8">Pointer-only prompt. Active branch only. Source policy verdicts do not transfer.</text>
    <text x="130" y="802" fill="#64748b">Run /handoff once; continue in the Codex terminal.</text>
  </g>
</svg>
