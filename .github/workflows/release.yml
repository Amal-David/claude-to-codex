name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Verify release tag
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $expected"
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Pack
        run: npm pack

      - name: Checksums
        run: shasum -a 256 claude-to-codex-*.tgz > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            claude-to-codex-*.tgz \
            SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
